experiment_name: gpt_dapt_social_domain
task: dapt

data:
  input_csv: data/processed/sentiment_preprocessed_variants.csv
  split_column: split
  label_column: sentiment_label
  text_column: text_for_model
  variant_column: text_variant
  allowed_variants: [original]
  split_map:
    train: train
    val: val
    test: test

model:
  name: openai-community/gpt2
  model_type: gpt_lm
  tokenizer_name: openai-community/gpt2
  num_labels: 3
  max_length: 128
  dropout: 0.1

training:
  output_dir: outputs/modeling/gpt_dapt
  batch_size: 8
  eval_batch_size: 16
  epochs: 2
  learning_rate: 5.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.05
  gradient_accumulation_steps: 1
  seed: 42
  fp16: false
  save_every_n_steps: 250
  log_every_n_steps: 50

logging:
  run_name: gpt_dapt_social_domain
  output_dir: outputs/modeling/gpt_dapt/logs
  save_predictions: false
  save_misclassified: false

ablation:
  remove_profanity: false
  remove_emojis: false

masking:
  mode: none
  mask_token: "[SLANG]"

dapt:
  enabled: true
  corpus_csv: data/processed/dapt_train_corpus.csv
  text_column: text_clean
  block_size: 128
  mlm_probability: 0.15
